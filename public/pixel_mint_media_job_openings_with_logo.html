
<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; font-family: 'Segoe UI', Arial, sans-serif; }

  .card {
    width: 680px;
    background: #0d1b2e;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
  }

  .top-bar {
    height: 5px;
    background: linear-gradient(90deg, #1a6ecf 0%, #4ade80 100%);
  }

  .header {
    padding: 28px 40px 20px;
    display: flex;
    align-items: center;
    gap: 24px;
    border-bottom: 1px solid rgba(74, 222, 128, 0.15);
  }

  .logo-wrap {
    flex-shrink: 0;
    width: 170px;
    height: 80px;
    border-radius: 10px;
    overflow: hidden;
    background: #0d2040;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .header-text {
    flex: 1;
  }

  .we-are-hiring {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #4ade80;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .headline {
    font-size: 26px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.15;
  }

  .subline {
    font-size: 12.5px;
    color: #7ba8d0;
    margin-top: 5px;
  }

  .divider-dot {
    width: 3px;
    height: 3px;
    background: #4ade80;
    border-radius: 50%;
    display: inline-block;
    margin: 0 6px;
    vertical-align: middle;
  }

  .body {
    padding: 22px 40px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .job-card {
    background: #102038;
    border-radius: 14px;
    border: 1px solid rgba(26, 110, 207, 0.35);
    overflow: hidden;
    display: flex;
  }

  .job-accent {
    width: 5px;
    background: linear-gradient(180deg, #1a6ecf, #4ade80);
    flex-shrink: 0;
  }

  .job-inner {
    padding: 18px 22px;
    flex: 1;
  }

  .job-top {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 14px;
  }

  .job-num {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a6ecf, #0d5aad);
    color: #fff;
    font-size: 13px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .job-title {
    font-size: 18px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.2;
  }

  .job-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    color: #4ade80;
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.3);
    margin-top: 5px;
    letter-spacing: 0.5px;
  }

  .job-divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.07);
    margin: 0 0 14px;
  }

  .job-details {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  .job-detail {
  }

  .detail-label {
    font-size: 10.5px;
    color: #5a88b0;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 3px;
  }

  .detail-val {
    font-size: 13.5px;
    color: #cde4f8;
    font-weight: 600;
  }

  .referral-banner {
    background: linear-gradient(135deg, #0f2e50, #103020);
    border: 1px solid rgba(74,222,128,0.3);
    border-radius: 14px;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .referral-left {
    font-size: 12px;
    color: #7ba8d0;
    line-height: 1.5;
  }

  .referral-right {
    text-align: right;
    flex-shrink: 0;
  }

  .referral-amount {
    font-size: 22px;
    font-weight: 900;
    color: #4ade80;
  }

  .referral-label {
    font-size: 10px;
    color: #5a88b0;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .footer {
    text-align: center;
    padding: 14px 40px 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .footer-cta {
    font-size: 12.5px;
    color: #7ba8d0;
    line-height: 1.6;
  }

  .footer-cta strong {
    color: #cde4f8;
    font-weight: 600;
  }

  .bottom-bar {
    height: 5px;
    background: linear-gradient(90deg, #4ade80 0%, #1a6ecf 100%);
  }

  .green { color: #4ade80; }
</style>
</head>
